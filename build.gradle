
plugins {
    id 'java'
    id 'com.gradleup.shadow' version '8.3.6'
}

group = 'pepsi'
version = '1.0'

repositories {
    mavenCentral()
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

jar {
    manifest {
        attributes 'Main-Class': 'pepsi.Pepsi'
    }
}